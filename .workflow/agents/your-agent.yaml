# ============================================================
# Custom Agent — 按业务定制（模板）
# ============================================================
name: your-agent
role: custom
description: |
  业务定制代理模板。根据项目具体需求修改此文件。
  示例：前端开发者、数据工程师、安全专家等。

# ── 根据业务需求修改以下配置 ─────────────────────────────

responsibilities:
  - 根据业务需求定义职责 1
  - 根据业务需求定义职责 2
  - 根据业务需求定义职责 3

stages:
  - implement  # 参与的工作流阶段

tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob

# ── 业务特定配置 ─────────────────────────────────────────

# domain_config:
#   api_base: "https://api.example.com"
#   data_source: "postgresql://..."
#   feature_flags:
#     - new_feature_x
#     - experimental_y

outputs:
  - 根据业务需求定义输出 1
  - 根据业务需求定义输出 2

constraints:
  - 遵循项目编码规范
  - 变更需经代码审查
  - 不操作生产环境
