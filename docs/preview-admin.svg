<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="12" fill="#F7F8FA"/>

  <!-- Title -->
  <text x="600" y="45" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="bold" fill="#1A1F36" text-anchor="middle">管理后台一览</text>

  <!-- Card 1: Dashboard -->
  <g transform="translate(36, 70)">
    <rect x="0" y="0" width="360" height="260" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>

    <!-- Stat cards row -->
    <rect x="16" y="16" width="74" height="40" rx="8" fill="#EEF2FF"/>
    <text x="53" y="33" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6366F1" text-anchor="middle">今日收入</text>
    <text x="53" y="47" font-family="-apple-system, sans-serif" font-size="12" font-weight="bold" fill="#4338CA" text-anchor="middle">12,580</text>

    <rect x="98" y="16" width="74" height="40" rx="8" fill="#F0FDF4"/>
    <text x="135" y="33" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#22C55E" text-anchor="middle">预订数</text>
    <text x="135" y="47" font-family="-apple-system, sans-serif" font-size="12" font-weight="bold" fill="#15803D" text-anchor="middle">86</text>

    <rect x="180" y="16" width="74" height="40" rx="8" fill="#FFF7ED"/>
    <text x="217" y="33" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#F59E0B" text-anchor="middle">活跃用户</text>
    <text x="217" y="47" font-family="-apple-system, sans-serif" font-size="12" font-weight="bold" fill="#B45309" text-anchor="middle">324</text>

    <rect x="262" y="16" width="74" height="40" rx="8" fill="#FDF2F8"/>
    <text x="299" y="33" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#EC4899" text-anchor="middle">场地利用</text>
    <text x="299" y="47" font-family="-apple-system, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">78%</text>

    <!-- Bar chart -->
    <g transform="translate(30, 72)">
      <!-- Grid lines -->
      <line x1="0" y1="0" x2="300" y2="0" stroke="#F3F4F6" stroke-width="1"/>
      <line x1="0" y1="35" x2="300" y2="35" stroke="#F3F4F6" stroke-width="1"/>
      <line x1="0" y1="70" x2="300" y2="70" stroke="#F3F4F6" stroke-width="1"/>
      <line x1="0" y1="105" x2="300" y2="105" stroke="#F3F4F6" stroke-width="1"/>
      <line x1="0" y1="140" x2="300" y2="140" stroke="#F3F4F6" stroke-width="1"/>

      <!-- Bars -->
      <rect x="10" y="50" width="26" height="90" rx="4" fill="url(#barGrad1)"/>
      <rect x="48" y="20" width="26" height="120" rx="4" fill="url(#barGrad2)"/>
      <rect x="86" y="70" width="26" height="70" rx="4" fill="url(#barGrad1)"/>
      <rect x="124" y="30" width="26" height="110" rx="4" fill="url(#barGrad2)"/>
      <rect x="162" y="55" width="26" height="85" rx="4" fill="url(#barGrad1)"/>
      <rect x="200" y="10" width="26" height="130" rx="4" fill="url(#barGrad2)"/>
      <rect x="238" y="40" width="26" height="100" rx="4" fill="url(#barGrad1)"/>
      <rect x="276" y="60" width="26" height="80" rx="4" fill="url(#barGrad2)"/>

      <!-- X-axis labels -->
      <text x="23" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Mon</text>
      <text x="61" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Tue</text>
      <text x="99" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Wed</text>
      <text x="137" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Thu</text>
      <text x="175" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Fri</text>
      <text x="213" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Sat</text>
      <text x="251" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Sun</text>
      <text x="289" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">Mon</text>
    </g>

    <!-- Card title -->
    <text x="180" y="248" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Dashboard</text>
  </g>

  <!-- Card 2: Time Slot View -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="360" height="260" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>

    <!-- Header labels -->
    <text x="50" y="28" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">场地</text>
    <g transform="translate(82, 14)">
      <text x="14" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">8:00</text>
      <text x="42" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">9:00</text>
      <text x="70" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">10:00</text>
      <text x="98" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">11:00</text>
      <text x="126" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">12:00</text>
      <text x="154" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">13:00</text>
      <text x="182" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">14:00</text>
      <text x="210" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">15:00</text>
      <text x="238" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">16:00</text>
      <text x="266" y="14" font-family="-apple-system, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">17:00</text>
    </g>

    <!-- Row labels -->
    <text x="40" y="50" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">1号场</text>
    <text x="40" y="86" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">2号场</text>
    <text x="40" y="122" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">3号场</text>
    <text x="40" y="158" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">4号场</text>
    <text x="40" y="194" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">5号场</text>

    <!-- Grid: 5 rows x 10 cols -->
    <g transform="translate(82, 36)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="26" height="26" rx="3" fill="#34D399"/><rect x="28" y="0" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="56" y="0" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="84" y="0" width="26" height="26" rx="3" fill="#34D399"/><rect x="112" y="0" width="26" height="26" rx="3" fill="#EF4444"/><rect x="140" y="0" width="26" height="26" rx="3" fill="#34D399"/><rect x="168" y="0" width="26" height="26" rx="3" fill="#FBBF24"/><rect x="196" y="0" width="26" height="26" rx="3" fill="#34D399"/><rect x="224" y="0" width="26" height="26" rx="3" fill="#34D399"/><rect x="252" y="0" width="26" height="26" rx="3" fill="#3B82F6"/>
      <!-- Row 2 -->
      <rect x="0" y="36" width="26" height="26" rx="3" fill="#EF4444"/><rect x="28" y="36" width="26" height="26" rx="3" fill="#EF4444"/><rect x="56" y="36" width="26" height="26" rx="3" fill="#34D399"/><rect x="84" y="36" width="26" height="26" rx="3" fill="#34D399"/><rect x="112" y="36" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="140" y="36" width="26" height="26" rx="3" fill="#FBBF24"/><rect x="168" y="36" width="26" height="26" rx="3" fill="#34D399"/><rect x="196" y="36" width="26" height="26" rx="3" fill="#EF4444"/><rect x="224" y="36" width="26" height="26" rx="3" fill="#34D399"/><rect x="252" y="36" width="26" height="26" rx="3" fill="#34D399"/>
      <!-- Row 3 -->
      <rect x="0" y="72" width="26" height="26" rx="3" fill="#34D399"/><rect x="28" y="72" width="26" height="26" rx="3" fill="#34D399"/><rect x="56" y="72" width="26" height="26" rx="3" fill="#FBBF24"/><rect x="84" y="72" width="26" height="26" rx="3" fill="#EF4444"/><rect x="112" y="72" width="26" height="26" rx="3" fill="#34D399"/><rect x="140" y="72" width="26" height="26" rx="3" fill="#34D399"/><rect x="168" y="72" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="196" y="72" width="26" height="26" rx="3" fill="#34D399"/><rect x="224" y="72" width="26" height="26" rx="3" fill="#EF4444"/><rect x="252" y="72" width="26" height="26" rx="3" fill="#FBBF24"/>
      <!-- Row 4 -->
      <rect x="0" y="108" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="28" y="108" width="26" height="26" rx="3" fill="#34D399"/><rect x="56" y="108" width="26" height="26" rx="3" fill="#34D399"/><rect x="84" y="108" width="26" height="26" rx="3" fill="#FBBF24"/><rect x="112" y="108" width="26" height="26" rx="3" fill="#FBBF24"/><rect x="140" y="108" width="26" height="26" rx="3" fill="#EF4444"/><rect x="168" y="108" width="26" height="26" rx="3" fill="#34D399"/><rect x="196" y="108" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="224" y="108" width="26" height="26" rx="3" fill="#34D399"/><rect x="252" y="108" width="26" height="26" rx="3" fill="#34D399"/>
      <!-- Row 5 -->
      <rect x="0" y="144" width="26" height="26" rx="3" fill="#34D399"/><rect x="28" y="144" width="26" height="26" rx="3" fill="#EF4444"/><rect x="56" y="144" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="84" y="144" width="26" height="26" rx="3" fill="#34D399"/><rect x="112" y="144" width="26" height="26" rx="3" fill="#34D399"/><rect x="140" y="144" width="26" height="26" rx="3" fill="#34D399"/><rect x="168" y="144" width="26" height="26" rx="3" fill="#FBBF24"/><rect x="196" y="144" width="26" height="26" rx="3" fill="#34D399"/><rect x="224" y="144" width="26" height="26" rx="3" fill="#3B82F6"/><rect x="252" y="144" width="26" height="26" rx="3" fill="#EF4444"/>
    </g>

    <!-- Legend -->
    <g transform="translate(90, 215)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#34D399"/>
      <text x="14" y="9" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280">可预订</text>
      <rect x="55" y="0" width="10" height="10" rx="2" fill="#EF4444"/>
      <text x="69" y="9" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280">已满</text>
      <rect x="100" y="0" width="10" height="10" rx="2" fill="#3B82F6"/>
      <text x="114" y="9" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280">预留</text>
      <rect x="145" y="0" width="10" height="10" rx="2" fill="#FBBF24"/>
      <text x="159" y="9" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#6B7280">维护</text>
    </g>

    <!-- Card title -->
    <text x="180" y="248" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">时段视图</text>
  </g>

  <!-- Card 3: Data Statistics -->
  <g transform="translate(804, 70)">
    <rect x="0" y="0" width="360" height="260" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>

    <!-- Trend line chart -->
    <g transform="translate(20, 16)">
      <!-- Grid lines -->
      <line x1="0" y1="20" x2="320" y2="20" stroke="#F3F4F6" stroke-width="1"/>
      <line x1="0" y1="45" x2="320" y2="45" stroke="#F3F4F6" stroke-width="1"/>
      <line x1="0" y1="70" x2="320" y2="70" stroke="#F3F4F6" stroke-width="1"/>
      <line x1="0" y1="95" x2="320" y2="95" stroke="#F3F4F6" stroke-width="1"/>

      <!-- Area fill -->
      <polygon points="0,85 40,60 80,70 120,40 160,50 200,25 240,35 280,20 320,30 320,95 0,95" fill="rgba(99,102,241,0.1)"/>

      <!-- Trend line -->
      <polyline points="0,85 40,60 80,70 120,40 160,50 200,25 240,35 280,20 320,30" fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Data points -->
      <circle cx="0" cy="85" r="3" fill="#6366F1"/>
      <circle cx="40" cy="60" r="3" fill="#6366F1"/>
      <circle cx="80" cy="70" r="3" fill="#6366F1"/>
      <circle cx="120" cy="40" r="3" fill="#6366F1"/>
      <circle cx="160" cy="50" r="3" fill="#6366F1"/>
      <circle cx="200" cy="25" r="3" fill="#6366F1"/>
      <circle cx="240" cy="35" r="3" fill="#6366F1"/>
      <circle cx="280" cy="20" r="3" fill="#6366F1"/>
      <circle cx="320" cy="30" r="3" fill="#6366F1"/>

      <!-- Second line (revenue) -->
      <polyline points="0,70 40,75 80,55 120,65 160,35 200,45 240,30 280,40 320,15" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,3"/>
    </g>

    <!-- Divider -->
    <line x1="20" y1="125" x2="340" y2="125" stroke="#F3F4F6" stroke-width="1"/>

    <!-- Donut chart -->
    <g transform="translate(100, 180)">
      <!-- Donut segments using arc paths -->
      <!-- Segment 1: 35% - Blue (0 to 126 degrees) -->
      <path d="M0,-45 A45,45 0 0,1 40.4,-19.9 L26.9,-13.3 A30,30 0 0,0 0,-30 Z" fill="#3B82F6"/>
      <!-- Segment 2: 25% - Green (126 to 216 degrees) -->
      <path d="M40.4,-19.9 A45,45 0 0,1 16.2,42 L10.8,28 A30,30 0 0,0 26.9,-13.3 Z" fill="#22C55E"/>
      <!-- Segment 3: 22% - Yellow (216 to 295.2 degrees) -->
      <path d="M16.2,42 A45,45 0 0,1 -38.2,-23.4 L-25.5,-15.6 A30,30 0 0,0 10.8,28 Z" fill="#FBBF24"/>
      <!-- Segment 4: 18% - Pink (295.2 to 360 degrees) -->
      <path d="M-38.2,-23.4 A45,45 0 0,1 0,-45 L0,-30 A30,30 0 0,0 -25.5,-15.6 Z" fill="#EC4899"/>
      <!-- Center circle (donut hole) -->
      <circle cx="0" cy="0" r="22" fill="#FFFFFF"/>
      <text x="0" y="4" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">100%</text>
    </g>

    <!-- Donut legend -->
    <g transform="translate(195, 152)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#3B82F6"/>
      <text x="12" y="8" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6B7280">散客 35%</text>

      <rect x="0" y="18" width="8" height="8" rx="2" fill="#22C55E"/>
      <text x="12" y="26" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6B7280">会员 25%</text>

      <rect x="0" y="36" width="8" height="8" rx="2" fill="#FBBF24"/>
      <text x="12" y="44" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6B7280">团课 22%</text>

      <rect x="0" y="54" width="8" height="8" rx="2" fill="#EC4899"/>
      <text x="12" y="62" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6B7280">赛事 18%</text>
    </g>

    <!-- Card title -->
    <text x="180" y="248" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">数据统计</text>
  </g>

  <!-- Footer branding -->
  <text x="600" y="365" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle">T-Line Sports Club Admin Panel</text>
</svg>