<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1F36"/>
      <stop offset="100%" stop-color="#2255CC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
