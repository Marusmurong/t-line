    <text x="20" y="17" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">Go</text>

    <rect x="52" y="0" width="52" height="26" rx="6" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="78" y="17" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">Vue3</text>

    <rect x="116" y="0" width="86" height="26" rx="6" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="159" y="17" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">PostgreSQL</text>

    <rect x="214" y="0" width="56" height="26" rx="6" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="242" y="17" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">Redis</text>
  </g>

  <!-- Tennis Ball (top-right) -->
