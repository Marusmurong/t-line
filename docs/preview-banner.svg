    <rect x="14" y="158" width="92" height="10" rx="4" fill="#F3F4F6"/>
    <rect x="14" y="174" width="92" height="10" rx="4" fill="#F3F4F6"/>
    <rect x="14" y="190" width="92" height="10" rx="4" fill="#F3F4F6"/>
    <rect x="14" y="206" width="92" height="10" rx="4" fill="#F3F4F6"/>
