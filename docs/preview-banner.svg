  <circle cx="100" cy="430" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="160" cy="440" r="4" fill="rgba(255,255,255,0.1)"/>
  <circle cx="300" cy="410" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="400" cy="450" r="3" fill="rgba(255,255,255,0.1)"/>
