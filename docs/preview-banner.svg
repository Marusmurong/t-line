  <path d="M1100 35 Q1120 60 1100 85" fill="none" stroke="#A0B828" stroke-width="2.5"/>
  <path d="M1140 35 Q1120 60 1140 85" fill="none" stroke="#A0B828" stroke-width="2.5"/>

  <!-- Phone 1: Home (left, slightly lower) -->
  <g transform="translate(560, 110)">
