    <circle cx="22" cy="147" r="3" fill="#6366F1"/>
    <circle cx="22" cy="163" r="3" fill="#22C55E"/>
    <circle cx="22" cy="179" r="3" fill="#F59E0B"/>
    <circle cx="22" cy="195" r="3" fill="#EC4899"/>
    <circle cx="22" cy="211" r="3" fill="#8B5CF6"/>
