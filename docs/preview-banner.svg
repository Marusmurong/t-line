  <text x="84" y="195" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" fill="#FFFFFF">SPORTS CLUB</text>
  <text x="84" y="240" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">网球馆智能管理系统</text>

  <!-- Tech Tags -->
  <g transform="translate(84, 270)">
