      <rect x="0" y="0" width="11" height="22" rx="2" fill="#34D399"/><rect x="13" y="0" width="11" height="22" rx="2" fill="#34D399"/><rect x="26" y="0" width="11" height="22" rx="2" fill="#EF4444"/><rect x="39" y="0" width="11" height="22" rx="2" fill="#34D399"/><rect x="52" y="0" width="11" height="22" rx="2" fill="#3B82F6"/><rect x="65" y="0" width="11" height="22" rx="2" fill="#34D399"/><rect x="78" y="0" width="11" height="22" rx="2" fill="#FBBF24"/><rect x="91" y="0" width="11" height="22" rx="2" fill="#34D399"/>
      <!-- Row 2 -->
      <rect x="0" y="25" width="11" height="22" rx="2" fill="#3B82F6"/><rect x="13" y="25" width="11" height="22" rx="2" fill="#34D399"/><rect x="26" y="25" width="11" height="22" rx="2" fill="#34D399"/><rect x="39" y="25" width="11" height="22" rx="2" fill="#EF4444"/><rect x="52" y="25" width="11" height="22" rx="2" fill="#EF4444"/><rect x="65" y="25" width="11" height="22" rx="2" fill="#FBBF24"/><rect x="78" y="25" width="11" height="22" rx="2" fill="#34D399"/><rect x="91" y="25" width="11" height="22" rx="2" fill="#3B82F6"/>
      <!-- Row 3 -->
      <rect x="0" y="50" width="11" height="22" rx="2" fill="#34D399"/><rect x="13" y="50" width="11" height="22" rx="2" fill="#EF4444"/><rect x="26" y="50" width="11" height="22" rx="2" fill="#3B82F6"/><rect x="39" y="50" width="11" height="22" rx="2" fill="#34D399"/><rect x="52" y="50" width="11" height="22" rx="2" fill="#34D399"/><rect x="65" y="50" width="11" height="22" rx="2" fill="#34D399"/><rect x="78" y="50" width="11" height="22" rx="2" fill="#EF4444"/><rect x="91" y="50" width="11" height="22" rx="2" fill="#FBBF24"/>
      <!-- Row 4 -->
      <rect x="0" y="75" width="11" height="22" rx="2" fill="#FBBF24"/><rect x="13" y="75" width="11" height="22" rx="2" fill="#34D399"/><rect x="26" y="75" width="11" height="22" rx="2" fill="#34D399"/><rect x="39" y="75" width="11" height="22" rx="2" fill="#3B82F6"/><rect x="52" y="75" width="11" height="22" rx="2" fill="#34D399"/><rect x="65" y="75" width="11" height="22" rx="2" fill="#EF4444"/><rect x="78" y="75" width="11" height="22" rx="2" fill="#34D399"/><rect x="91" y="75" width="11" height="22" rx="2" fill="#34D399"/>
      <!-- Row 5 -->
      <rect x="0" y="100" width="11" height="22" rx="2" fill="#34D399"/><rect x="13" y="100" width="11" height="22" rx="2" fill="#3B82F6"/><rect x="26" y="100" width="11" height="22" rx="2" fill="#FBBF24"/><rect x="39" y="100" width="11" height="22" rx="2" fill="#34D399"/><rect x="52" y="100" width="11" height="22" rx="2" fill="#EF4444"/><rect x="65" y="100" width="11" height="22" rx="2" fill="#34D399"/><rect x="78" y="100" width="11" height="22" rx="2" fill="#3B82F6"/><rect x="91" y="100" width="11" height="22" rx="2" fill="#34D399"/>
      <!-- Row 6 -->
      <rect x="0" y="125" width="11" height="22" rx="2" fill="#EF4444"/><rect x="13" y="125" width="11" height="22" rx="2" fill="#34D399"/><rect x="26" y="125" width="11" height="22" rx="2" fill="#34D399"/><rect x="39" y="125" width="11" height="22" rx="2" fill="#FBBF24"/><rect x="52" y="125" width="11" height="22" rx="2" fill="#34D399"/><rect x="65" y="125" width="11" height="22" rx="2" fill="#3B82F6"/><rect x="78" y="125" width="11" height="22" rx="2" fill="#34D399"/><rect x="91" y="125" width="11" height="22" rx="2" fill="#EF4444"/>
