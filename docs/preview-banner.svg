    <!-- Status bar -->
    <rect x="8" y="8" width="104" height="28" rx="8" fill="#3B82F6"/>
    <text x="60" y="27" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">T-Line</text>
    <!-- 2x2 Grid entries -->
    <rect x="14" y="48" width="42" height="42" rx="8" fill="#EEF2FF"/>
    <rect x="64" y="48" width="42" height="42" rx="8" fill="#F0FDF4"/>
    <rect x="14" y="98" width="42" height="42" rx="8" fill="#FFF7ED"/>
    <rect x="64" y="98" width="42" height="42" rx="8" fill="#FDF2F8"/>
