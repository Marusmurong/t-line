    <rect x="46" y="96" width="28" height="32" rx="6" fill="#DCFCE7"/>
    <rect x="80" y="96" width="28" height="32" rx="6" fill="#EDE9FE"/>
    <!-- Wallet icons -->
    <text x="26" y="117" font-family="-apple-system, sans-serif" font-size="10" fill="#F59E0B" text-anchor="middle">$</text>
    <text x="60" y="117" font-family="-apple-system, sans-serif" font-size="10" fill="#22C55E" text-anchor="middle">P</text>
    <text x="94" y="117" font-family="-apple-system, sans-serif" font-size="10" fill="#8B5CF6" text-anchor="middle">C</text>
